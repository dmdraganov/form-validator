<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пример использования Form Validator</title>
  <style>
    body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
    .container { max-width: 600px; margin: 0 auto; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    input { width: calc(100% - 16px); padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    .error { color: red; font-size: 0.8rem; margin-top: 0.25rem; min-height: 1.2rem; }
    button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background-color: #0056b3; }
    .success-message { color: green; font-weight: bold; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Форма регистрации</h1>
    <form id="registration-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email">
        <div class="error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label for="phone">Телефон</label>
        <input type="tel" id="phone" name="phone">
        <div class="error" id="phone-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password">
        <div class="error" id="password-error"></div>
      </div>
      <div class="form-group">
        <label for="password-confirm">Подтверждение пароля</label>
        <input type="password" id="password-confirm" name="password-confirm">
        <div class="error" id="password-confirm-error"></div>
      </div>
      <div class="form-group">
        <label for="inn">ИНН</label>
        <input type="text" id="inn" name="inn">
        <div class="error" id="inn-error"></div>
      </div>
      <div class="form-group">
        <label for="snils">СНИЛС</label>
        <input type="text" id="snils" name="snils">
        <div class="error" id="snils-error"></div>
      </div>
      <div class="form-group">
        <label for="date">Дата (ГГГГ-ММ-ДД)</label>
        <input type="text" id="date" name="date">
        <div class="error" id="date-error"></div>
      </div>
      <button type="submit">Зарегистрироваться</button>
      <div class="success-message" id="success-message"></div>
    </form>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
